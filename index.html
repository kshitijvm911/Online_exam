<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Examination Platform</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f0f2f5; color: #333; }
        .container { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); max-width: 800px; margin: auto; }
        h2 { color: #1a73e8; margin-top: 0; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 95%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .student-bar { background: #e8f0fe; padding: 10px 15px; border-radius: 6px; margin-bottom: 15px; font-size: 0.95rem; }
        .timer-box { font-size: 1.25rem; font-weight: bold; color: #d93025; background: #fce8e6; padding: 10px; border-radius: 6px; display: inline-block; margin-bottom: 20px; }
        .exam-layout { display: flex; gap: 20px; align-items: flex-start; }
        .sidebar { width: 140px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .subject-btn { background-color: #f8f9fa; color: #3c4043; border: 2px solid #dadce0; padding: 12px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: left; }
        .subject-btn:hover { background-color: #e8eaed; }
        .subject-btn.active { background-color: #1a73e8; color: white; border-color: #1a73e8; }
        .master-submit-btn { background-color: #137333; color: white; border: none; padding: 15px 12px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .master-submit-btn:hover { background-color: #0b5121; }
        .main-content { flex: 1; min-width: 0; }
        .palette-panel { background: #f8f9fa; border: 1px solid #dadce0; border-radius: 8px; padding: 12px; margin-bottom: 20px; }
        .palette-title { font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; color: #5f6368; text-align: center; }
        .palette-grid { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .palette-btn { background-color: #e8eaed; color: #3c4043; border: 1px solid #dadce0; width: 40px; height: 40px; font-size: 0.95rem; font-weight: bold; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .palette-btn:hover { background-color: #dadce0; }
        .palette-btn.active { background-color: #1a73e8 !important; color: white !important; border-color: #1a73e8; }
        .palette-btn.answered { background-color: #137333 !important; color: white !important; border-color: #137333; }
        .progress-bar { font-size: 1rem; color: #1a73e8; margin-bottom: 10px; font-weight: bold; border-bottom: 2px solid #e8eaed; padding-bottom: 10px;}
        .question-container { min-height: 150px; }
        .question-text { font-size: 1.1rem; font-weight: bold; color: #202124; margin-bottom: 15px;}
        .options label { display: block; margin: 10px 0; cursor: pointer; font-size: 1.05rem; padding: 8px; border-radius: 4px; transition: background 0.2s;}
        .options label:hover { background: #f1f3f4; }
        .options input[type="radio"] { margin-right: 10px; transform: scale(1.2);}
        .nav-buttons { display: flex; justify-content: space-between; gap: 15px; margin-top: 20px; border-top: 2px solid #e8eaed; padding-top: 20px;}
        button.action-btn { width: 100%; border: none; padding: 12px; font-size: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer; color: white; transition: background 0.2s; }
        .primary-btn { background-color: #1a73e8; }
        .primary-btn:hover { background-color: #1557b0; }
        .secondary-btn { background-color: #5f6368; }
        .secondary-btn:hover { background-color: #45474a; }
        .scorecard-header { background: #1a73e8; color: white; padding: 10px; border-radius: 6px 6px 0 0; }
        .scorecard-body { border: 2px solid #1a73e8; border-top: none; padding: 20px; border-radius: 0 0 6px 6px; background: #fafafa; }
        .score-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ccc; font-size: 1.1rem; }
        .score-total { display: flex; justify-content: space-between; padding: 15px 10px; background: #e6f4ea; color: #137333; font-weight: bold; font-size: 1.3rem; border-radius: 6px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="loginView">
        <h2>Student Examination Portal</h2>
        <p style="color: #666;">Please sign in to begin your evaluation.</p>
        <hr>
        <div class="input-group">
            <label>Student Name:</label>
            <input type="text" id="studentName" placeholder="e.g. ashin">
        </div>
        <div class="input-group">
            <label>Student ID / Roll No:</label>
            <input type="text" id="studentId" placeholder="e.g. STU002">
        </div>
        <button type="button" class="action-btn primary-btn" id="loginBtn" onclick="startExamSession()">Enter Examination Room</button>
    </div>

    <div id="examView" style="display: none;">
        <h2>Online Examination</h2>
        
        <div class="student-bar">
            <span>Student: <b id="displayStudent"></b></span> | 
            <span>ID: <b id="displayId"></b></span>
        </div>
        <div class="timer-box">Time Remaining: <span id="clock">00:03:00</span></div>
        
        <div class="exam-layout">
            <div class="sidebar">
                <button type="button" class="subject-btn" id="tab-Java" onclick="switchSubject('Java')">Java</button>
                <button type="button" class="subject-btn" id="tab-C++" onclick="switchSubject('C++')">C++</button>
                <button type="button" class="subject-btn" id="tab-C" onclick="switchSubject('C')">C</button>
                <button type="button" class="master-submit-btn" onclick="confirmSubmission()">Submit All Exams</button>
            </div>

            <div class="main-content">
                <div class="palette-panel">
                    <div class="palette-title">Question Grid Map (<span id="palette-subject-label">Java</span>)</div>
                    <div class="palette-grid" id="palette-grid-container"></div>
                </div>

                <div class="progress-bar">
                    Question <span id="currentNum">1</span> of 10
                </div>

                <div class="question-container">
                    <div class="question-text" id="qText">Loading...</div>
                    <div class="options">
                        <label>
                            <input type="radio" name="answerOption" value="A" id="optA" onchange="recordAnswer('A')"> 
                            <span id="labelA">Option A</span>
                        </label>
                        <label>
                            <input type="radio" name="answerOption" value="B" id="optB" onchange="recordAnswer('B')"> 
                            <span id="labelB">Option B</span>
                        </label>
                    </div>
                </div>

                <div class="nav-buttons">
                    <button type="button" id="prevBtn" class="action-btn secondary-btn" onclick="navigate(-1)">Previous</button>
                    <button type="button" id="nextBtn" class="action-btn primary-btn" onclick="navigate(1)">Next</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scorecardView" style="display: none; text-align: center;">
        <div class="scorecard-header">
            <h3 style="margin: 0; color: white;">OFFICIAL EXAMINATION REPORT CARD</h3>
        </div>
        <div class="scorecard-body">
            <p><b>Student Name:</b> <span id="cardName"></span></p>
            <p><b>Student ID:</b> <span id="cardId"></span></p>
            <hr>
            <div id="marks-display-area" style="text-align: left; margin-top: 20px;"></div>
        </div>
    </div>
</div>

<script>
    const questionDatabase = {
        "C": [
            { q: "What is the format specifier for an integer in C?", a: "A) %d", b: "B) %f" },
            { q: "Which function is used for dynamic memory allocation?", a: "A) malloc", b: "B) new" },
            { q: "Does C support Object-Oriented Programming?", a: "A) Yes", b: "B) No" },
            { q: "What symbol is used for the address-of operator?", a: "A) *", b: "B) &" },
            { q: "What is the null character string terminator?", a: "A) \\0", b: "B) \\n" },
            { q: "Which keyword exits a loop early?", a: "A) continue", b: "B) break" },
            { q: "Does C have a built-in boolean data type in C89?", a: "A) Yes", b: "B) No" },
            { q: "Who developed the C language?", a: "A) Dennis Ritchie", b: "B) Bjarne Stroustrup" },
            { q: "Is an array index 0-based in C?", a: "A) Yes", b: "B) No" },
            { q: "Which header file is required for printf?", a: "A) stdlib.h", b: "B) stdio.h" }
        ],
        "C++": [
            { q: "Who created C++?", a: "A) Bjarne Stroustrup", b: "B) Dennis Ritchie" },
            { q: "What is the output operator in C++?", a: "A) <<", b: "B) >>" },
            { q: "How do you deallocate memory assigned by 'new'?", a: "A) free", b: "B) delete" },
            { q: "What is the default access specifier in a C++ class?", a: "A) public", b: "B) private" },
            { q: "Which keyword is used to group logical code blocks?", a: "A) package", b: "B) namespace" },
            { q: "Can C++ destructors take arguments?", a: "A) Yes", b: "B) No" },
            { q: "Does C++ support multiple inheritance?", a: "A) Yes", b: "B) No" },
            { q: "Which keyword denotes an inline function?", a: "A) inline", b: "B) macro" },
            { q: "What does STL stand for?", a: "A) Standard Template Library", b: "B) Simple Type Language" },
            { q: "Is 'cin' used for input or output?", a: "A) Input", b: "B) Output" }
        ],
        "Java": [
            { q: "What is the size of primitive int data type in java?", a: "A) 2 byte", b: "B) 4 byte" },
            { q: "Inheritance keyword?", a: "A) extends", b: "B) imports" },
            { q: "Which component executes Java bytecode?", a: "A) JVM", b: "B) JDK" },
            { q: "Is 'String' a primitive data type in Java?", a: "A) Yes", b: "B) No" },
            { q: "Default value of a boolean primitive variable?", a: "A) true", b: "B) false" },
            { q: "Which keyword prevents a class from being inherited?", a: "A) final", b: "B) static" },
            { q: "Which dynamic collection allows duplicate elements?", a: "A) List", b: "B) Set" },
            { q: "Can an abstract class instantiate objects natively?", a: "A) Yes", b: "B) No" },
            { q: "Which package is imported by default in all Java files?", a: "A) java.util", b: "B) java.lang" },
            { q: "Does Java support direct multiple class inheritance?", a: "A) Yes", b: "B) No" }
        ]
    };

    let remainingTime = 180; // Set to 3 minutes
    let intervalTracker;
    let storedStudentId = "";
    let currentSubject = "Java"; 
    let currentQuestionIndex = 0; 
    
    let studentAnswers = {
        "Java": Array(10).fill(''),
        "C++": Array(10).fill(''),
        "C": Array(10).fill('')
    };

    function startExamSession() {
        const name = document.getElementById('studentName').value.trim();
        const id = document.getElementById('studentId').value.trim();

        if (name === "" || id === "") {
            alert("Please fill fields.");
            return;
        }

        document.getElementById('loginBtn').disabled = true;
        document.getElementById('loginBtn').innerText = "Authenticating...";

        fetch('http://localhost:8080/login', {
            method: 'POST',
            body: `${id},${name}`
        })
        .then(res => res.text())
        .then(status => {
            if (status === "SUCCESS") {
                storedStudentId = id; 
                document.getElementById('displayStudent').innerText = name;
                document.getElementById('displayId').innerText = id;
                document.getElementById('cardName').innerText = name;
                document.getElementById('cardId').innerText = id;

                document.getElementById('loginView').style.display = 'none';
                document.getElementById('examView').style.display = 'block';

                generatePalette();
                switchSubject('Java'); 
                startClock();
            } else {
                alert("ACCESS DENIED: Credentials not registered on the Java Server.");
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('loginBtn').innerText = "Enter Examination Room";
            }
        })
        .catch(err => {
            alert("Error checking backend server. Is the Java application running?");
            document.getElementById('loginBtn').disabled = false;
            document.getElementById('loginBtn').innerText = "Enter Examination Room";
        });
    }

    function startClock() {
        const clockDisplay = document.getElementById('clock');
        intervalTracker = setInterval(() => {
            remainingTime--;
            let hrs = Math.floor(remainingTime / 3600);
            let mins = Math.floor((remainingTime % 3600) / 60);
            let secs = remainingTime % 60;
            
            clockDisplay.textContent = 
                `${hrs < 10 ? '0'+hrs : hrs}:${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;
            
            // Auto-submits when remaining time reaches 0
            if (remainingTime <= 0) {
                clearInterval(intervalTracker);
                sendMasterSubmission(); 
            }
        }, 1000);
    }

    function generatePalette() {
        const container = document.getElementById('palette-grid-container');
        container.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            let btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'palette-btn';
            btn.id = `pBtn${i}`;
            btn.innerText = i + 1;
            btn.onclick = () => loadQuestion(i);
            container.appendChild(btn);
        }
    }

    function switchSubject(subjectName) {
        currentSubject = subjectName;
        currentQuestionIndex = 0; 
        
        document.querySelectorAll('.subject-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${subjectName}`).classList.add('active');
        document.getElementById('palette-subject-label').innerText = subjectName;

        loadQuestion(currentQuestionIndex);
    }

    function loadQuestion(index) {
        currentQuestionIndex = index;
        const qData = questionDatabase[currentSubject][index];
        const savedAnswer = studentAnswers[currentSubject][index];
        
        document.getElementById('currentNum').innerText = index + 1;
        document.getElementById('qText').innerText = `Q${index + 1}: ${qData.q}`;
        document.getElementById('labelA').innerText = qData.a;
        document.getElementById('labelB').innerText = qData.b;
        
        document.getElementById('optA').checked = (savedAnswer === 'A');
        document.getElementById('optB').checked = (savedAnswer === 'B');

        updateButtonsAndPalette();
    }

    function recordAnswer(choice) {
        studentAnswers[currentSubject][currentQuestionIndex] = choice;
        updateButtonsAndPalette();
    }

    function navigate(direction) {
        const newIndex = currentQuestionIndex + direction;
        if (newIndex >= 0 && newIndex <= 9) {
            loadQuestion(newIndex);
        }
    }

    function updateButtonsAndPalette() {
        document.getElementById('prevBtn').disabled = (currentQuestionIndex === 0);
        
        const nextBtn = document.getElementById('nextBtn');
        if (currentQuestionIndex === 9) {
            nextBtn.disabled = true;
            nextBtn.style.backgroundColor = "#ccc";
            nextBtn.style.cursor = "not-allowed";
        } else {
            nextBtn.disabled = false;
            nextBtn.style.backgroundColor = "#1a73e8";
            nextBtn.style.cursor = "pointer";
        }

        for (let i = 0; i < 10; i++) {
            const btn = document.getElementById(`pBtn${i}`);
            btn.classList.remove('active', 'answered');

            if (i === currentQuestionIndex) {
                btn.classList.add('active');
            } else if (studentAnswers[currentSubject][i] !== '') {
                btn.classList.add('answered');
            }
        }
    }

    function confirmSubmission() {
        if (confirm("Are you sure you want to submit? This will finish all 3 subjects (Java, C++, and C).")) {
            sendMasterSubmission();
        }
    }

    function sendMasterSubmission() {
        clearInterval(intervalTracker);
        
        let payloadParts = [];
        for (let subj of ["Java", "C++", "C"]) {
            let finalAns = studentAnswers[subj].map(ans => ans === '' ? 'S' : ans);
            payloadParts.push(subj + "=" + finalAns.join(','));
        }
        
        const rawPayload = payloadParts.join('|');

        document.getElementById('examView').style.display = 'none';
        document.getElementById('scorecardView').style.display = 'block';

        fetch('http://localhost:8080/submit', {
            method: 'POST',
            headers: {
                'X-Student-ID': storedStudentId
            },
            body: rawPayload
        })
        .then(res => res.text())
        .then(serverMessage => {
            const dataParts = serverMessage.split(',');
            let htmlOutput = "";
            
            for (let part of dataParts) {
                let kv = part.split(':');
                if (kv.length === 2) {
                    let title = kv[0].trim();
                    let score = kv[1].trim();
                    
                    if (title === "Total") {
                        htmlOutput += `<div class="score-total"><span>FINAL TOTAL SCORE</span><span>${score} / 60.0</span></div>`;
                    } else {
                        htmlOutput += `<div class="score-row"><span>${title} Marks:</span><span>${score} / 20.0</span></div>`;
                    }
                }
            }
            document.getElementById('marks-display-area').innerHTML = htmlOutput;
        })
        .catch(error => {
            document.getElementById('marks-display-area').innerHTML = "<span style='color: red;'>Error communicating with backend.</span>";
        });
    }
</script>

</body>
</html>
